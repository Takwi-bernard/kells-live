<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Dashboard - Kells Live</title>
</head>
<body>

<div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 class="logo">Kells<span>Live</span></h2>

        <div class="nav">
            <button type="submit" onclick="goLive()">🎥 Go Live</button>
            <button onclick="watchLive()">📺 Explore</button>
            <button onclick="logout()">🚪 Logout</button>
        </div>

        <div class="user-box">
            <p id="userEmail">Loading terminal...</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <div class="topbar">
            <h3>Live Broadcasters</h3>
            <p>Discover what's happening now</p>
        </div>

        <!-- STREAM GRID -->
        <div class="grid">
            <div class="card-stream">
                <div class="thumbnail"></div>
                <h4>No active feeds yet</h4>
                <p style="color: var(--text-secondary); font-size: 13px; margin-top: 5px;">Be the first to push live transmission</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="../js/dashboard.js"></script>
</body>
</html>
