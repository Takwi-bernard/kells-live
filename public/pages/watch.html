<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Feed - Kells Live</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="watch-page">
    <header class="watch-header">
        <div>
            <h2 class="logo">Kells<span>Live</span></h2>
            <span id="streamStatus">🔴 LIVE FEED</span>
        </div>
        <div>
            <p id="viewerCount" style="font-weight: 500;">👥 0 Watching Now</p>
        </div>
    </header>

    <div class="watch-layout">
        <div class="video-area">
            <video id="remoteVideo" autoplay playsinline controls></video>
            
            <div class="stream-details" style="margin-top: 15px;">
                <h2 id="streamTitle" style="font-size:22px;"></h2>
                <p id="streamCategory" style="color: var(--accent-blue); font-size:14px; font-weight:600;"></p>
                <p id="hostName" style="font-size:13px;"></p>
            </div>

            <div class="watch-actions">
                <button onclick="toggleMic()">🎤 Mic Mode</button>
                <button onclick="copyStreamLink()">📋 Share Feed</button>
                <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
                <button onclick="leaveStream()" style="border-color:#ef4444; color:#ef4444;">Leave</button>
            </div>
        </div>

        <div class="chat-panel">
            <h3>💬 Broadcaster Chat</h3>
            <div id="messages"></div>

            <div class="chat-message">
                <input id="chatMessage" placeholder="Transmit a public chat message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module" src="../js/watch.js"></script>
</body>
</html>
