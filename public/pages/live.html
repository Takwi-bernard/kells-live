<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Create Stream - Kells Live</title>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="margin-bottom: 10px;">🎥 Setup Live Stream</h2>

        <input id="title" placeholder="Stream Title">
        <textarea id="description" placeholder="Description Details" rows="3"></textarea>

        <select id="category">
            <option>Coding</option>
            <option>Education</option>
            <option>Gaming</option>
            <option>Music</option>
            <option>General</option>
        </select>

        <input id="duration" placeholder="Expected duration (e.g. 2 hours)">

        <select id="privacy">
            <option value="public">Public Stream</option>
            <option value="private">Private Isolation</option>
        </select>

        <button class="btn" onclick="createStream()">Initialize Transmission</button>
    </div>
</div>

<script type="module" src="../js/live.js"></script>
</body>
</html>
